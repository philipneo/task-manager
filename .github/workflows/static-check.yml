name: Static site check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check required files
        run: |
          test -f index.html
          test -f styles.css
          test -f script.js

      - name: Check JavaScript syntax
        run: node --check script.js
